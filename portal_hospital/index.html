<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Emergencias - Hospital Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <main class="glass-panel">
        <header>
            <div class="logo-container">
                <span class="pulse-dot"></span>
                <h1>Urgencias</h1>
            </div>
            <p>Sistema Inteligente de Triage</p>
        </header>

        <form id="admissionForm">
            <div class="input-group">
                <label for="pacienteId">Identificación del Paciente</label>
                <input type="text" id="pacienteId" name="pacienteId" placeholder="Ej. 123456789" required autocomplete="off">
            </div>

            <button type="submit" id="submitBtn">
                <span class="btn-text">Registrar Ingreso</span>
                <span class="spinner hidden"></span>
            </button>
        </form>

        <div id="statusMessage" class="status-message hidden">
            <!-- Messages will be injected here -->
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
